# 專案基本資訊
sonar.projectKey=john19968010_Leo_112502528
sonar.organization=john19968010
sonar.host.url=https://sonarcloud.io

# 原始碼與測試路徑
sonar.sources=asgards
sonar.tests=tests
sonar.python.version=3.9

# 排除不需要分析的路徑
sonar.exclusions=**/__pycache__/**, **/*.pyc, scripts/**, tests/**
sonar.test.inclusions=tests/**/*.py

# 匯入測試結果與涵蓋率 (由 pytest 產生)
sonar.python.xunit.reportPath=test-results.xml
sonar.python.coverage.reportPaths=coverage.xml

# 指定編碼
sonar.sourceEncoding=UTF-8
