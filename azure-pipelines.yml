trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.9'

stages:
- stage: QualityAndTest
  displayName: 'Quality and Unit Test'
  jobs:
  - job: RunTests
    displayName: 'Pytest & Sonar Analysis'
    steps:
    - checkout: self
      fetchDepth: 0

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        # 如果 asgards 底下有其他的 requirements 也一併安裝
        if [ -f asgards/snake_game/requirements.txt ]; then
          pip install -r asgards/snake_game/requirements.txt
        fi
      displayName: 'Install dependencies'

    - script: |
        # 紀錄執行開始
        python scripts/metrics_logger.py
      displayName: 'Initialize Metrics'

    - script: |
        # 產出 test-results.xml 與 coverage.xml
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest tests/ --doctest-modules --junitxml=test-results.xml --cov=asgards --cov-report=xml:coverage.xml
      displayName: 'Run Unittests with Coverage'

    - task: PublishTestResults@2
      condition: succeededOrFailed()
      inputs:
        testResultsFiles: '**/test-results.xml'
        testRunTitle: 'Python $(pythonVersion) Unit Tests'

    - task: PublishCodeCoverageResults@2
      inputs:
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.xml'
        pathToSources: '$(System.DefaultWorkingDirectory)/asgards'

    # SonarQube Cloud 整合 (使用 v4 版本與您原本的設定)
    - task: SonarCloudPrepare@4
      inputs:
        SonarCloud: 'MySonarQube'
        organization: 'john19968010'
        scannerMode: 'CLI'
        configMode: 'file'
        configFile: 'sonar-project.properties'

    - task: SonarCloudAnalyze@4

    - task: SonarCloudPublish@4
      inputs:
        pollingTimeoutSec: '300'

- stage: Performance
  displayName: 'Performance Measurement'
  dependsOn: QualityAndTest
  jobs:
  - job: Benchmark
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'

    - script: |
        pip install psutil
        python scripts/benchmark.py
      displayName: 'Run Performance Benchmark'

    - script: |
        # 模擬記錄 Token 與效能階段耗時
        python -c "from scripts.metrics_logger import MetricsLogger; l=MetricsLogger('performance_stage'); l.log_tokens(500, 200); l.save()"
      displayName: 'Log Performance Metrics'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'performance_report.json'
        ArtifactName: 'PerformanceReports'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'execution_metrics.json'
        ArtifactName: 'ExecutionMetrics'
