# Azure DevOps Pipeline 定義檔
# 遵循憲法原則：自動觸發、SonarQube 檢查、極簡流程

trigger:
- 001-snake-game  # 當此分支有 commit 時自動觸發

pool:
  vmImage: 'ubuntu-latest'

variables:
  # 憲法提醒：嚴禁在此硬編碼 Secrets，請使用 Variable Groups
  pythonVersion: '3.9'

stages:
- stage: BuildAndTest
  displayName: '編譯與測試階段'
  jobs:
  - job: RunTests
    displayName: '執行單元測試'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: $(pythonVersion)
      displayName: '設定 Python 環境'

    - script: |
        python -m pip install --upgrade pip
        # 這裡可以安裝依賴，例如：pip install -r requirements.txt
      displayName: '安裝依賴'

    - script: |
        # 執行測試的範例命令
        python -m unittest discover tests
      displayName: '執行單元測試'

    - stage: CodeQuality
    displayName: '程式碼品質檢查階段'
    jobs:
    - job: SonarAnalysis
    displayName: 'SonarQube 分析'
    steps:
    # 1. 準備 SonarQube 分析環境
    - task: SonarQubePrepare@5
      inputs:
        SonarQube: 'MySonarQube'  # 您的 Service Connection 名稱
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: 'john19968010_Leo_112502528'
        cliProjectName: 'Leo_112502528'
        cliSources: 'asgards'    # 掃描原始碼目錄
        extraProperties: |
          sonar.tests=tests
          sonar.python.version=3
      displayName: '準備 SonarQube 分析'

    # 2. 執行代碼掃描
    - task: SonarQubeAnalyze@5
      displayName: '執行 SonarQube 代碼掃描'

    # 3. 發佈品質門檻 (Quality Gate) 結果
    - task: SonarQubePublish@5
      inputs:
        pollingTimeoutSec: '300'
      displayName: '發佈品質門檻結果'

