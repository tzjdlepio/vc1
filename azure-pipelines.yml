# Azure DevOps Pipeline 定義檔 (SonarCloud 修正版)
# 遵循憲法原則：自動觸發、SonarCloud 檢查、詳細日誌診斷

trigger:
- 001-snake-game

pr:
- 001-snake-game

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.9'

stages:
- stage: BuildAndTest
  displayName: '編譯與測試階段'
  jobs:
  - job: RunTests
    displayName: '執行單元測試'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: $(pythonVersion)
      displayName: '設定 Python 環境'

    - script: |
        python -m pip install --upgrade pip
        # 若有 requirements.txt 則安裝
        if [ -f asgards/snake_game/requirements.txt ]; then
          pip install -r asgards/snake_game/requirements.txt
        fi
      displayName: '安裝依賴'

    - script: |
        python -m unittest discover tests
      displayName: '執行單元測試'

- stage: CodeQuality
  displayName: '程式碼品質檢查階段'
  jobs:
  - job: SonarAnalysis
    displayName: 'SonarCloud 分析'
    steps:
    # 1. 準備 SonarCloud 分析環境 (使用 @4 版本)
    - task: SonarCloudPrepare@4
      inputs:
        SonarCloud: 'MySonarQube'  # 請確認此名稱與 ADO Service Connection 一致
        organization: 'john19968010' # 請替換為您的 Org Key
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: 'john19968010_Leo_112502528'
        cliProjectName: 'Leo_112502528'
        cliSources: 'asgards'             # 擴大範圍至根目錄，避免找不到路徑
        extraProperties: |
          sonar.tests=tests
          sonar.python.version=3
          sonar.verbose=true
          sonar.log.level=DEBUG
          sonar.exclusions=**/__pycache__/**, **/*.pyc
          sonar.test.inclusions=tests/**/*.py
      displayName: '準備 SonarCloud 分析'

    # 2. 執行代碼掃描 (使用 @4 版本)
    - task: SonarCloudAnalyze@4
      displayName: '執行 SonarCloud 代碼掃描'

    # 3. 發佈品質門檻結果 (使用 @4 版本)
    - task: SonarCloudPublish@4
      inputs:
        pollingTimeoutSec: '300'
      displayName: '發佈品質門檻結果'
